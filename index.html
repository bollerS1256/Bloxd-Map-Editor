<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloxd.io Hybrid Map Editor v12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; user-select: none; }
        header { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2a2a2a; height: 60px; box-sizing: border-box; }
        h1 { margin: 0; font-size: 18px; color: #00adb5; }
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); width: 100%; }
        .sidebar { width: 300px; background: #1e1e1e; border-right: 2px solid #2a2a2a; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .sidebar-title { font-size: 13px; font-weight: bold; color: #00adb5; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
        input[type="range"] { padding: 0; background: #333; height: 6px; border-radius: 3px; outline: none; width: 100%; }
        button.btn-primary { background: #28a745; border: none; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 4px; color: white; font-size: 14px; }
        button.btn-primary:hover { background: #218838; }
        .block-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; max-height: 200px; overflow-y: auto; border: 1px solid #333; padding: 5px; background: #151515; border-radius: 4px; }
        .block-item { padding: 8px 5px; text-align: center; background: #252525; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .block-item.active { border-color: #00adb5; background: #00adb533; font-weight: bold; }
        .workspace { flex: 1; display: flex; background: #050505; }
        .view-panel { flex: 1; display: flex; flex-direction: column; position: relative; border-left: 1px solid #2a2a2a; }
        .panel-label { background: #151515; padding: 6px 12px; font-size: 12px; font-weight: bold; border-bottom: 1px solid #2a2a2a; color: #00adb5; }
        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: auto; background: #0e0e10; }
        #editor-canvas { background: #151515; box-shadow: 0 0 20px rgba(0,0,0,0.7); cursor: crosshair; }
        #three-container { flex: 1; position: relative; }
        .instructions { position: absolute; bottom: 10px; right: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 6px; font-size: 11px; pointer-events: none; line-height: 1.6; border: 1px solid #333; z-index: 10; }
    </style>
</head>
<body>

    <header>
        <h1>Bloxd.io Hybrid Schematic Editor (32x32)</h1>
        <button class="btn-primary" id="export-btn">Export .bloxdschem</button>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-title">Layer Control (Y Elevation)</div>
            <div class="control-group">
                <label>Current Layer Y: <span id="current-layer-val">0</span></label>
                <input type="range" id="current-layer" min="0" max="31" value="0">
            </div>

            <div class="sidebar-title">Select Active Block</div>
            <div class="block-list" id="block-selector"></div>
            
            <div class="sidebar-title">Info</div>
            <div id="stats" style="font-size: 12px; color: #888;">Coordinates: X: 0, Z: 0</div>
        </div>

        <div class="workspace">
            <div class="view-panel">
                <div class="panel-label">2D Grid Paint Canvas</div>
                <div id="canvas-container">
                    <canvas id="editor-canvas" width="512" height="512"></canvas>
                </div>
            </div>
            
            <div class="view-panel" id="three-container">
                <div class="panel-label">3D Real-time Live View</div>
                <div class="instructions">
                    • Left Click & Drag on 2D Grid to Draw.<br>
                    • Use Mouse on 3D View to rotate/zoom around your build.
                </div>
            </div>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
